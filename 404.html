<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — SA Business Tools</title>
<meta name="robots" content="noindex, nofollow">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #2a2a3a;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --text: #e8e8f0;
    --muted: #8888a8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .code {
    font-size: clamp(5rem, 20vw, 9rem);
    font-weight: 800;
    letter-spacing: -4px;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 1.5rem;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 0.75rem;
    letter-spacing: -0.4px;
  }
  p {
    color: var(--muted);
    font-size: 1rem;
    max-width: 400px;
    line-height: 1.6;
    margin-bottom: 2.5rem;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--accent);
    color: white;
    border: none;
    padding: 0.75rem 1.6rem;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 600;
    text-decoration: none;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:hover { opacity: 0.9; transform: scale(1.02); }
  .divider {
    width: 48px;
    height: 2px;
    background: var(--border);
    margin: 2.5rem auto;
    border-radius: 2px;
  }
  .logo {
    font-size: 1rem;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: -0.3px;
  }
  .logo span { color: var(--accent); }
</style>
</head>
<body>

  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you were looking for doesn't exist or may have been moved. Head back to the store to find what you need.</p>
  <a href="https://tlangelanibrian.github.io/sa-tools-store/" class="btn">
    ← Back to SATools Store
  </a>
  <div class="divider"></div>
  <div class="logo">SA<span>Tools</span>.store</div>

</body>
</html>
